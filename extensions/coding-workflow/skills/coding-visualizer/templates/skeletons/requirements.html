/* === requirements 阶段特有样式 === */
.uc { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin: 14px 0; }
.uc h3 { margin-top: 0; color: var(--accent); font-family: var(--font-mono); font-size: 15px; }
.uc-meta { color: var(--text-dim); font-size: 13px; margin: 2px 0 8px; font-family: var(--font-mono); }
.ac { font-size: 14px; list-style: none; padding: 0; }
.ac li { margin: 3px 0; padding-left: 16px; position: relative; }
.ac li::before { content: '☐'; position: absolute; left: 0; color: var(--text-dim); }
.ac-normal { color: var(--green); font-weight: 600; }
.ac-abnormal { color: var(--red); font-weight: 600; }
.ac-boundary { color: var(--amber); font-weight: 600; }
.ac-normal::before, .ac-abnormal::before, .ac-boundary::before { content: '●'; font-size: 8px; top: 7px; }
</style>
